# Production stack for Tutor Clockwork.
#
# Quick start (from repo root, after copying deploy/.env.example to deploy/.env
# and filling in the secrets):
#
#   docker compose -f deploy/docker-compose.yml --env-file deploy/.env up -d --build
#
# Stack:
#   - db        : Postgres 16 (private network only, no published port)
#   - backend   : Node + Prisma. Runs `prisma migrate deploy` on boot.
#   - caddy     : Single image baking the built SPA + reverse-proxying /api.
#                 Owns 80/443 and provisions Let's Encrypt automatically.
#   - db-backup : Sidecar that pg_dumps daily to ./backups/.
#
# Single backend instance assumed — the lesson-completion worker uses an
# in-process inflight flag (see §12.3 in the SaaS migration spec). If you
# scale horizontally, gate the sweep with a Postgres advisory lock first.

services:
  db:
    image: postgres:16-alpine
    container_name: tutor-clockwork-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tutor}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-tutor}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    container_name: tutor-clockwork-backend
    restart: unless-stopped
    deploy:
      replicas: 1
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-tutor}?schema=public
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
      COOKIE_SECURE: "true"
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      INITIAL_OWNER_EMAIL: ${INITIAL_OWNER_EMAIL:-}
      INITIAL_OWNER_PASSWORD: ${INITIAL_OWNER_PASSWORD:-}
      RATE_LIMIT_GENERAL_PER_MIN: ${RATE_LIMIT_GENERAL_PER_MIN:-1000}
    depends_on:
      db:
        condition: service_healthy

  caddy:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
    container_name: tutor-clockwork-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?APP_DOMAIN is required}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

  db-backup:
    image: prodrigestivill/postgres-backup-local:16-alpine
    container_name: tutor-clockwork-db-backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-tutor}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # cron format: every day at 02:00 host time.
      SCHEDULE: "0 2 * * *"
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-7}
      BACKUP_KEEP_WEEKS: ${BACKUP_KEEP_WEEKS:-4}
      BACKUP_KEEP_MONTHS: ${BACKUP_KEEP_MONTHS:-6}
      HEALTHCHECK_PORT: 8080
    volumes:
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  caddy_data:
  caddy_config:
